<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://hdkhoijkawwyfnjvsmdi.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self';" />
<title>Mifuyu OS — Log in</title>
<link rel="icon" type="image/png" href="sakura.png" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100vh;font-family:"Quicksand",ui-rounded,"SF Pro Rounded",system-ui,sans-serif;}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#eef2fb;
    background-image:radial-gradient(80% 50% at 100% 0%,#f7e0f3 0%,transparent 60%),
                     radial-gradient(70% 50% at 0% 0%,#e2e9fb 0%,transparent 55%);
    background-attachment:fixed;
  }
  .card{
    background:#fff;border-radius:22px;padding:34px 30px;max-width:340px;width:90%;
    box-shadow:0 18px 50px rgba(117,138,198,.20);text-align:center;
  }
  .fox{font-size:34px;}
  h1{font-size:21px;margin:10px 0 2px;color:#3a3550;font-weight:700;}
  p.sub{font-size:13px;color:#8b86a3;margin:0 0 20px;}
  input{
    width:100%;box-sizing:border-box;padding:11px 13px;margin-bottom:10px;
    border:1.5px solid #e4e1f0;border-radius:12px;font-size:14px;outline:none;color:#3a3550;
  }
  input:focus{border-color:#758ac6;}
  button{
    width:100%;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:600;color:#fff;
    cursor:pointer;background:linear-gradient(90deg,#758ac6,#ff9ed8);
  }
  button:disabled{opacity:.6;cursor:default;}
  #msg{font-size:12.5px;color:#c46a8e;margin-top:12px;min-height:16px;}
  #msg.ok{color:#3a9d83;}
  a{font-size:12px;color:#99a6d5;text-decoration:none;display:inline-block;margin-top:4px;}
</style>
</head>
<body>
  <div class="card">
    <div class="fox">❄️🦊</div>
    <h1>Konfuyu~!</h1>
    <p class="sub">Welcome back to your cozy space 🌸</p>
    <input id="lgEmail" type="email" placeholder="email" autocomplete="username" />
    <input id="lgPass" type="password" placeholder="password" autocomplete="current-password" />
    <button id="lgBtn">Log in 💗</button>
    <div id="msg"></div>
    <a id="lgForgot" href="#">forgot password?</a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js"></script>
</body>
</html>
