<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<!-- CSP via meta tag — GitHub Pages can't set response headers, so this is the only enforcement point available.
     img-src allows any https image because journal/inspo entries embed arbitrary user-picked image URLs.
     Known gap: meta-delivered CSP can't carry frame-ancestors (CSP3 disallows it for <meta>), and GitHub
     Pages gives no way to send X-Frame-Options / X-Content-Type-Options / Permissions-Policy either — so
     there's no clickjacking protection here short of moving off GitHub Pages or fronting it with something
     that can inject real response headers. -->
<meta name="referrer" content="strict-origin-when-cross-origin" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data: media-src https: mediastream:; connect-src 'self' https://hdkhoijkawwyfnjvsmdi.supabase.co; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" />
<title>Mifuyu OS ❄️🦊</title>
<link rel="icon" type="image/png" href="sakura.png" />
<link rel="apple-touch-icon" href="AYAYA.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#758ac6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Mifuyu OS" />
<!-- =========================================================================
  Mifuyu OS — a gentle, private snowfox companion + creator OS for Mifu 🦊❄️
  PCOS patterns · Mounjaro (tirzepatide) journey · weight (trend-first) ·
  mental-health Care tools · gentle pattern-spotter. NOT a medical device.
  Self-tracking, not diagnosis — her care team's plan always comes first.
========================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet" />
<!-- Supabase is loaded lazily at boot, and only when CONFIG keys are set (see start() at the bottom). -->
<link rel="stylesheet" href="style.css" />
<!-- Vendored instead of CDN-loaded — see vendor/README.md for why and how to update. -->
<script src="vendor/twemoji.min.js"></script>
</head>
<body>
<div id="app-shell">
<!-- ===== LEFT SIDEBAR ===== -->
<aside id="sidebar">
  <div id="sb-header">
    <span class="brand" data-act="modeToggle" title="tap the logo to swap between Creator and Health"><img class="brand-logo" src="Logo.png" alt="Mifuyu OS" /></span>
    <button id="sb-expand" data-act="sidebarToggle" title="Open menu"><img src="AYAYA.png" alt="Open menu" /></button>
    <button id="sb-collapse" data-act="sidebarToggle" title="Collapse sidebar">«</button>
  </div>
  <div id="sb-mode">
    <button id="sbCreatorBtn" data-act="sbMode" data-m="creator">🎀 Creator</button>
    <button id="sbHealthBtn" data-act="sbMode" data-m="health">❄️ Health</button>
  </div>
  <nav id="nav"></nav>
  <div id="sb-footer">
    <div class="right">
      <button id="lockChip" class="chip" data-act="toggleLock" title="Lock / unlock the layout">🔓</button>
      <button class="chip" data-act="settings" title="Comfort &amp; display">⚙️</button>
    </div>
  </div>
</aside>
<!-- ===== MAIN CONTENT ===== -->
<div id="main-col">
<div id="rail">
  <button id="sb-open-btn" data-act="sidebarToggle" title="Open menu">☰</button>
  <span class="brand rail-brand" data-act="modeToggle" title="tap to swap modes" style="display:none"><img class="brand-logo" src="Logo.png" alt="mifuyu" /></span>
  <div class="rail-right" style="display:none;gap:9px;align-items:center">
    <span id="status-rail" class="chip">…</span>
    <button class="chip" data-act="settings" title="Comfort &amp; display">⚙️</button>
    <span class="avatar"><img src="AYAYA.png" alt="Mifu" /></span>
  </div>
</div>
<div id="global-header"></div>
<main id="view"><div class="boot-sk" aria-busy="true" aria-label="Loading your space">
  <div class="panel sk-card"><div class="skeleton sk-title"></div><div class="skeleton sk-line"></div><div class="skeleton sk-line"></div><div class="skeleton sk-line" style="width:68%"></div></div>
  <div class="panel sk-card"><div class="skeleton sk-title"></div><div class="skeleton sk-line"></div><div class="skeleton sk-line" style="width:55%"></div></div>
</div></main>
<div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<div id="modal"></div>
<div id="stickyLayer"></div>
<button id="voiceFab" data-act="voiceOpen" title="Capture a thought (Alt+R)" aria-label="Capture a thought by voice or text">🎙️</button>
<button id="addStickyBtn" data-act="addSticky" title="New sticky note">🗒️+</button>
<button id="restBtn" data-act="toggleRest" title="Pomodoro &amp; rest timer">🍅</button>
<div id="restWidget" class="hidden"></div>
<div id="kiko" title="Ask Kiko ❄️ (drag to throw!)"><div class="kiko-sprite" id="kikoSprite"></div></div>
<div id="kikoBubble" class="hidden" data-act="kikoToggle"></div>
<div id="kikoChat" class="hidden"></div>

<script src="js/core.js"></script>
<script src="js/view-home.js"></script>
<script src="js/view-gachas.js"></script>
<script src="js/view-kiko.js"></script>
<script src="js/view-planner.js"></script>
<script src="js/view-calendar.js"></script>
<script src="js/view-events.js"></script>
<script src="js/view-creator.js"></script>
<script src="js/view-money.js"></script>
<script src="js/view-art.js"></script>
<script src="js/view-toolbox.js"></script>
<script src="js/view-life.js"></script>
<script src="js/view-health.js"></script>
<script src="js/view-food.js"></script>
<script src="js/view-journal.js"></script>
<script src="js/view-care.js"></script>
<script src="js/view-bunny.js"></script>
<script src="js/view-trends.js"></script>
<script src="js/view-memories.js"></script>
<script src="js/view-settings.js"></script>
</div><!-- end #main-col -->
</div><!-- end #app-shell -->
</body>
</html>
